
<h1>Curso de Desarrollo Web</h1>

<h2>Introducción a CSS</h2>

<p>
    CSS permite personalizar la apariencia de una página web mediante
    colores, fuentes y otros estilos visuales.
</p>

<p>
    Los colores ayudan a transmitir emociones y a destacar información.
</p>

<ul>
    <li>Azul: confianza.</li>
    <li>Verde: crecimiento.</li>
    <li>Rojo: atención.</li>
</ul>
